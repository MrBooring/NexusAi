<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #334155;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #334155;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: #cbd5e1;
        }

        .tab-btn.active {
            color: #60a5fa;
            border-bottom-color: #60a5fa;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chat-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 200px);
        }

        .chat-sidebar {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
        }

        .chat-main {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .chat-input-area {
            border-top: 1px solid #334155;
            padding-top: 15px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: #0f172a;
            border-color: #60a5fa;
        }

        .chat-item.active {
            background: #0f172a;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
        }

        .chat-item-title {
            font-weight: 600;
            color: #60a5fa;
            margin-bottom: 4px;
            font-size: 0.9em;
        }

        .chat-item-preview {
            color: #94a3b8;
            font-size: 0.8em;
            line-height: 1.3;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }

        .chat-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 10px;
        }

        .chat-send-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #475569;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.1);
        }

        .card h3 {
            color: #60a5fa;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            color: #60a5fa;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.95em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background: #0f172a;
            color: #60a5fa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #334155;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
        }

        tr:hover {
            background: #0f172a;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            font-family: inherit;
            margin-bottom: 10px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.1);
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .message-box {
            background: #0f172a;
            border-left: 3px solid #60a5fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .message-box.user {
            border-left-color: #10b981;
        }

        .message-box.assistant {
            border-left-color: #60a5fa;
        }

        .message-role {
            color: #94a3b8;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .message-content {
            color: #e2e8f0;
            line-height: 1.5;
        }

        .message-timestamp {
            color: #64748b;
            font-size: 0.8em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }

        .error {
            background: #7f1d1d;
            border: 1px solid #dc2626;
            color: #fecaca;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .success {
            background: #064e3b;
            border: 1px solid #10b981;
            color: #a7f3d0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .conversation-item {
            cursor: pointer;
            padding: 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            display: none;
        }

        .conversation-item.show {
            display: block;
        }

        .conversation-item:hover {
            background: #0f172a;
            border-color: #60a5fa;
        }

        .conversation-title {
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .conversation-meta {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .search-form {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            display: inline-block;
            background: #334155;
            color: #cbd5e1;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            font-size: 0.85em;
        }

        .tag.topic {
            background: #1e40af;
            color: #bfdbfe;
        }

        .badge {
            display: inline-block;
            background: #60a5fa;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .refresh-btn {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 NexusAI Dashboard</h1>
            <p class="subtitle">Local AI Assistant Memory & Learning System</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('overview')">📊 Overview</button>
            <button class="tab-btn" onclick="switchTab('conversations')">💬 Conversations</button>
            <button class="tab-btn" onclick="switchTab('chat')">💭 Chat</button>
            <button class="tab-btn" onclick="switchTab('search')">🔍 Search</button>
            <button class="tab-btn" onclick="switchTab('users')">👤 User Profiles</button>
        </div>

        <!-- OVERVIEW TAB -->
        <div id="overview" class="tab-content active">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button onclick="loadStats()">🔄 Refresh</button>
                <button onclick="loadConversations()">Sync Data</button>
            </div>

            <div class="stats-grid" id="statsContainer">
                <div class="stat-box">
                    <div class="stat-number" id="stat-convs">0</div>
                    <div class="stat-label">Conversations</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-msgs">0</div>
                    <div class="stat-label">Messages</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-topics">0</div>
                    <div class="stat-label">Topics</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat-users">0</div>
                    <div class="stat-label">User Profiles</div>
                </div>
            </div>

            <div class="card">
                <h3>Recent Conversations</h3>
                <div id="recentConversationsContainer"></div>
            </div>

            <div class="card">
                <h3>Important Conversations</h3>
                <div id="importantConversationsContainer"></div>
            </div>
        </div>

        <!-- CONVERSATIONS TAB -->
        <div id="conversations" class="tab-content">
            <div class="card">
                <h3>Start a New Chat</h3>
                <div style="display: grid; gap: 10px;">
                    <textarea id="newChatPrompt" rows="4" placeholder="Type your message here..." style="resize: vertical;"></textarea>
                    <button onclick="startNewChat()">🚀 Start New Chat</button>
                    <div id="chatResponseContainer"></div>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <button onclick="loadConversations()">🔄 Refresh</button>
                <input type="text" id="filterInput" placeholder="Filter conversations..." style="max-width: 300px; margin-left: 10px;">
            </div>

            <div id="conversationsContainer"></div>
        </div>

        <!-- CHAT TAB -->
        <div id="chat" class="tab-content">
            <div class="chat-layout">
                <!-- Sidebar with conversation list -->
                <div class="chat-sidebar">
                    <button class="new-chat-btn" onclick="createNewChat()">➕ New Chat</button>
                    <div id="chatListContainer">
                        <div class="loading">Loading conversations...</div>
                    </div>
                </div>

                <!-- Main chat area -->
                <div class="chat-main">
                    <div id="chatMessagesContainer">
                        <div class="empty-state">
                            <div class="empty-state-icon">💭</div>
                            <p>Select a conversation from the sidebar or start a new chat</p>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <textarea
                            id="chatInput"
                            class="chat-input"
                            placeholder="Type your message here..."
                            rows="3"
                            onkeydown="handleChatKeyPress(event)"
                        ></textarea>
                        <button id="sendButton" class="chat-send-btn" onclick="sendMessage()" disabled>Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SEARCH TAB -->
        <div id="search" class="tab-content">
            <div class="card">
                <h3>Search Conversations</h3>
                <div class="search-form">
                    <input type="text" id="searchQuery" placeholder="Search for messages, topics, or keywords...">
                    <button onclick="performSearch()">Search</button>
                </div>
                <div id="searchResultsContainer"></div>
            </div>
        </div>

        <!-- USERS TAB -->
        <div id="users" class="tab-content">
            <div style="margin-bottom: 20px;">
                <button onclick="loadUserProfiles()">🔄 Refresh Profiles</button>
                <input type="text" id="userFilterInput" placeholder="Filter users..." style="max-width: 300px; margin-left: 10px;">
            </div>

            <div id="userProfilesContainer"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let allConversations = [];
        let allUserProfiles = [];
        let activeConversationId = null;

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Auto-load data when switching tabs
            if (tabName === 'conversations') loadConversations();
            if (tabName === 'users') loadUserProfiles();
            if (tabName === 'chat') loadChatConversations();
            if (tabName === 'overview') loadStats();
        }

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/memory/stats`);
                const data = await response.json();
                
                document.getElementById('stat-convs').textContent = data.total_conversations || 0;
                document.getElementById('stat-msgs').textContent = data.total_messages || 0;
                document.getElementById('stat-topics').textContent = data.unique_topics || 0;
                document.getElementById('stat-users').textContent = 0; // Will update when loading profiles

                await loadRecentConversations();
                await loadImportantConversations();
            } catch (error) {
                showError('Failed to load statistics');
            }
        }

        // Load recent conversations
        async function loadRecentConversations() {
            try {
                const response = await fetch(`${API_BASE}/memory/recent?limit=5`);
                const data = await response.json();
                
                let html = '';
                if (data.conversations.length === 0) {
                    html = '<div class="empty-state"><p>No conversations yet</p></div>';
                } else {
                    data.conversations.forEach(conv => {
                        html += `
                            <div class="card" style="margin-bottom: 10px;">
                                <div class="conversation-title">${conv.conversation_id.substring(0, 8)}...</div>
                                <div class="conversation-meta">
                                    Messages: <strong>${conv.message_count}</strong> | 
                                    Topics: ${conv.topics.join(', ') || 'N/A'}
                                </div>
                                <div class="conversation-meta" style="margin-top: 5px;">${conv.summary || 'No summary'}</div>
                            </div>
                        `;
                    });
                }
                document.getElementById('recentConversationsContainer').innerHTML = html;
            } catch (error) {
                console.error('Error loading recent conversations:', error);
            }
        }

        // Load important conversations
        async function loadImportantConversations() {
            try {
                const response = await fetch(`${API_BASE}/memory/important?limit=5`);
                const data = await response.json();
                
                let html = '';
                if (data.conversations.length === 0) {
                    html = '<div class="empty-state"><p>No important conversations yet</p></div>';
                } else {
                    data.conversations.forEach(conv => {
                        html += `
                            <div class="card" style="margin-bottom: 10px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <div class="conversation-title">${conv.conversation_id.substring(0, 8)}...</div>
                                        <div class="conversation-meta">
                                            Messages: <strong>${conv.message_count}</strong> | 
                                            Importance: <span class="badge">${(conv.importance_score * 100).toFixed(1)}%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('importantConversationsContainer').innerHTML = html;
            } catch (error) {
                console.error('Error loading important conversations:', error);
            }
        }

        // Load all conversations
        async function loadConversations() {
            try {
                const container = document.getElementById('conversationsContainer');
                container.innerHTML = '<div class="loading">Loading conversations...</div>';

                const response = await fetch(`${API_BASE}/memory/conversations`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to fetch conversations');
                }

                allConversations = data.conversations || [];
                displayConversations(allConversations);
            } catch (error) {
                document.getElementById('conversationsContainer').innerHTML = 
                    `<div class="error">Failed to load conversations: ${error.message}</div>`;
            }
        }

        // Display conversations
        function displayConversations(conversations) {
            const container = document.getElementById('conversationsContainer');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No conversations yet</p></div>';
                return;
            }

            let html = '';
            conversations.forEach((conv, idx) => {
                html += `
                    <div class="conversation-item show">
                        <div class="conversation-title">Conversation #${idx + 1}</div>
                        <div class="conversation-meta">
                            ID: ${conv.conversation_id}</br>
                            Messages: <strong>${conv.message_count}</strong> | 
                            Topics: ${conv.topics.join(', ') || 'N/A'}
                        </div>
                        <div style="margin-top: 10px;">
                            <button onclick="viewConversationDetails('${conv.conversation_id}')">View Messages</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // View conversation details
        async function viewConversationDetails(convId) {
            try {
                const response = await fetch(`${API_BASE}/memory/conversations/${convId}`);
                const conv = await response.json();

                let html = `<div class="card"><h3>Conversation Details</h3>`;
                html += `<p><strong>ID:</strong> ${conv.conversation_id}</p>`;
                html += `<p><strong>Messages:</strong> ${conv.message_count}</p>`;
                html += `<p><strong>Summary:</strong> ${conv.summary || 'N/A'}</p>`;
                html += `<p><strong>Topics:</strong> ${conv.topics.map(t => `<span class="tag topic">${t}</span>`).join('')}</p>`;
                html += `<h4 style="margin-top: 20px; color: #60a5fa;">Messages</h4>`;

                conv.messages.forEach(msg => {
                    html += `
                        <div class="message-box ${msg.role}">
                            <div class="message-role">${msg.role.toUpperCase()}</div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                            <div class="message-timestamp">${new Date(msg.timestamp).toLocaleString()}</div>
                        </div>
                    `;
                });

                html += `</div>`;

                const container = document.getElementById('conversationsContainer');
                container.innerHTML = html + '<button onclick="loadConversations()" style="margin-top: 20px;">← Back to Conversations</button>';
            } catch (error) {
                showError('Failed to load conversation details');
            }
        }

        // Perform search
        async function performSearch() {
            const query = document.getElementById('searchQuery').value;
            if (!query) {
                showError('Please enter a search query');
                return;
            }

            try {
                const container = document.getElementById('searchResultsContainer');
                container.innerHTML = '<div class="loading">Searching...</div>';

                const response = await fetch(`${API_BASE}/memory/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();

                if (data.results.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No results found</p></div>';
                    return;
                }

                let html = `<div class="card"><h3>Search Results (${data.results.length} found)</h3>`;
                data.results.forEach(result => {
                    html += `
                        <div style="margin-bottom: 15px; padding: 10px; background: #0f172a; border-radius: 4px;">
                            <div class="conversation-title">Conversation ${result.conversation_id.substring(0, 8)}...</div>
                            <div class="message-box">${escapeHtml(result.content)}</div>
                            <div class="conversation-meta">Role: ${result.role} | Relevance: ${(result.relevance * 100).toFixed(1)}%</div>
                        </div>
                    `;
                });
                html += `</div>`;

                container.innerHTML = html;
            } catch (error) {
                showError('Search failed');
            }
        }

        // Start a new chat and store it in memory
        async function startNewChat() {
            const prompt = document.getElementById('newChatPrompt').value.trim();
            const responseContainer = document.getElementById('chatResponseContainer');
            if (!prompt) {
                responseContainer.innerHTML = '<div class="error">Please enter a message to start the chat.</div>';
                return;
            }

            responseContainer.innerHTML = '<div class="loading">Starting chat...</div>';
            try {
                const response = await fetch(`${API_BASE}/llm/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, context: '' })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Chat failed');
                }

                responseContainer.innerHTML = `
                    <div class="success">Chat created successfully.</div>
                    <div class="card" style="margin-top: 10px;">
                        <div class="conversation-title">Conversation ${data.conversation_id.substring(0, 8)}...</div>
                        <div class="conversation-meta">Assistant response:</div>
                        <div class="message-box assistant">${escapeHtml(data.response)}</div>
                    </div>
                `;
                document.getElementById('newChatPrompt').value = '';
                await loadConversations();
                await loadStats();
            } catch (error) {
                responseContainer.innerHTML = `<div class="error">Failed to start chat: ${error.message}</div>`;
            }
        }

        // Load user profiles
        async function loadUserProfiles() {
            try {
                const container = document.getElementById('userProfilesContainer');
                container.innerHTML = '<div class="loading">Loading user profile...</div>';

                // For single-user system, load the default user profile
                const response = await fetch(`${API_BASE}/users/profile/local_user`);
                if (response.status === 404) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👤</div>
                            <p>User profile will be generated after more conversations</p>
                            <p style="font-size: 0.9em; color: #64748b; margin-top: 10px;">Profiles are automatically created after 3+ messages in conversations</p>
                            <button onclick="generateUserProfile()" style="margin-top: 15px;">Generate Profile Now</button>
                        </div>
                    `;
                    return;
                }

                const profile = await response.json();
                displayUserProfile(profile);

            } catch (error) {
                document.getElementById('userProfilesContainer').innerHTML = 
                    `<div class="error">Failed to load user profile: ${error.message}</div>`;
            }
        }

        function displayUserProfile(profile) {
            const container = document.getElementById('userProfilesContainer');
            
            let html = '<div class="card"><h3>🧠 Your AI Learning Profile</h3>';
            
            // Behavior Analysis
            if (profile.behavior_profile) {
                html += '<h4>Communication Style</h4>';
                html += `<p><strong>Style:</strong> ${profile.behavior_profile.communication_style}</p>`;
                html += `<p><strong>Response Length:</strong> ${profile.behavior_profile.preferred_response_length}</p>`;
                html += `<p><strong>Topics:</strong> ${profile.behavior_profile.common_topics.join(', ')}</p>`;
            }
            
            // Knowledge Graph
            if (profile.knowledge_graph && profile.knowledge_graph.entities) {
                html += '<h4>Knowledge Graph</h4>';
                html += `<p><strong>Entities Learned:</strong> ${profile.knowledge_graph.entities.length}</p>`;
                
                if (profile.knowledge_graph.entities.length > 0) {
                    html += '<div style="margin-top: 10px;"><strong>Key Concepts:</strong></div>';
                    html += '<div style="display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px;">';
                    profile.knowledge_graph.entities.slice(0, 10).forEach(entity => {
                        html += `<span class="tag">${entity.name} (${entity.type})</span>`;
                    });
                    html += '</div>';
                }
            }
            
            // Preferences
            if (profile.preferences) {
                html += '<h4>Learned Preferences</h4>';
                html += `<p><strong>Topics:</strong> ${profile.preferences.preferred_topics.join(', ') || 'None yet'}</p>`;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        async function generateUserProfile() {
            try {
                const response = await fetch(`${API_BASE}/users/profile/local_user/learn`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    await loadUserProfiles();
                } else {
                    const error = await response.json();
                    showError(`Failed to generate profile: ${error.detail}`);
                }
            } catch (error) {
                showError(`Failed to generate profile: ${error.message}`);
            }
        }
        // Chat functionality
        async function loadChatConversations() {
            try {
                const container = document.getElementById('chatListContainer');
                container.innerHTML = '<div class="loading">Loading conversations...</div>';

                const response = await fetch(`${API_BASE}/memory/conversations`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to fetch conversations');
                }

                allConversations = data.conversations || [];
                displayChatList(allConversations);

                // If no active conversation, show empty state
                if (!activeConversationId && allConversations.length > 0) {
                    // Auto-select the most recent conversation
                    selectConversation(allConversations[0].conversation_id);
                }
            } catch (error) {
                document.getElementById('chatListContainer').innerHTML = 
                    `<div class="error">Failed to load conversations: ${error.message}</div>`;
            }
        }

        function displayChatList(conversations) {
            const container = document.getElementById('chatListContainer');
            
            if (conversations.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>No conversations yet</p></div>';
                return;
            }

            let html = '';
            conversations.forEach((conv, idx) => {
                const isActive = conv.conversation_id === activeConversationId;
                const preview = conv.messages.length > 0 ? 
                    conv.messages[conv.messages.length - 1].content.substring(0, 50) + '...' : 
                    'No messages yet';
                
                html += `
                    <div class="chat-item ${isActive ? 'active' : ''}" onclick="selectConversation('${conv.conversation_id}')">
                        <div class="chat-item-title">Chat ${idx + 1}</div>
                        <div class="chat-item-preview">${escapeHtml(preview)}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function createNewChat() {
            try {
                // Create a new conversation
                const response = await fetch(`${API_BASE}/memory/conversations/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: "New Chat" })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to create conversation');
                }

                activeConversationId = data.conversation_id;
                await loadChatConversations();
                selectConversation(activeConversationId);
                
                // Focus on input
                document.getElementById('chatInput').focus();
            } catch (error) {
                showError(`Failed to create new chat: ${error.message}`);
            }
        }

        async function selectConversation(conversationId) {
            activeConversationId = conversationId;
            
            // Update UI
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.chat-item').classList.add('active');
            
            // Load conversation messages
            await loadConversationMessages(conversationId);
        }

        async function loadConversationMessages(conversationId) {
            try {
                const container = document.getElementById('chatMessagesContainer');
                container.innerHTML = '<div class="loading">Loading messages...</div>';

                const response = await fetch(`${API_BASE}/memory/conversations/${conversationId}`);
                const conv = await response.json();
                if (!response.ok) {
                    throw new Error(conv.detail || 'Failed to load conversation');
                }

                displayChatMessages(conv.messages);
            } catch (error) {
                document.getElementById('chatMessagesContainer').innerHTML = 
                    `<div class="error">Failed to load messages: ${error.message}</div>`;
            }
        }

        function displayChatMessages(messages) {
            const container = document.getElementById('chatMessagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>No messages in this conversation</p></div>';
                return;
            }

            let html = '';
            messages.forEach(msg => {
                html += `
                    <div class="message-box ${msg.role}">
                        <div class="message-role">${msg.role.toUpperCase()}</div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                        <div class="message-timestamp">${new Date(msg.timestamp).toLocaleString()}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            const sendButton = document.getElementById('sendButton');
            
            if (!message || !activeConversationId) {
                return;
            }

            // Disable input and button
            input.disabled = true;
            sendButton.disabled = true;
            sendButton.textContent = 'Sending...';

            try {
                // Send message using the memory endpoint
                const response = await fetch(`${API_BASE}/memory/conversations/${activeConversationId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to send message');
                }

                // Reload messages and conversation list
                await loadConversationMessages(activeConversationId);
                await loadChatConversations();
                
                // Clear input
                input.value = '';
                
            } catch (error) {
                showError(`Failed to send message: ${error.message}`);
            } finally {
                // Re-enable input and button
                input.disabled = false;
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
                input.focus();
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Update send button state based on input
        document.addEventListener('input', function(e) {
            if (e.target.id === 'chatInput') {
                const sendButton = document.getElementById('sendButton');
                sendButton.disabled = !e.target.value.trim() || !activeConversationId;
            }
        });
        // Filter input listeners
        document.addEventListener('DOMContentLoaded', function() {
            const filterInput = document.getElementById('filterInput');
            if (filterInput) {
                filterInput.addEventListener('input', function() {
                    const filtered = allConversations.filter(conv =>
                        conv.conversation_id.includes(this.value) ||
                        conv.topics.some(t => t.toLowerCase().includes(this.value.toLowerCase()))
                    );
                    displayConversations(filtered);
                });
            }

            // Initial load
            loadStats();
        });

        // Utility functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            console.error(message);
            alert(message);
        }
    </script>
</body>
</html>
